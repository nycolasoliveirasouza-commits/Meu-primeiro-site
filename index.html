<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" type="text/css" href="style.css">
</head>
<body>
<header>
       <h1>Meu blog tech</h1>
       <p>Vou compartilhar conjecimentos sobre tecnologia e programação</p>
</header>
<main>
       <img src="imagem.png" alt="Logotipo do meu blog de tecnologia e educação.">
       <div>
              <h2>Meu primeiro post</h2>
              <p class="artigo-autor">Por: Nycolas oliveira</p>
              <p>boas vindas ao meu novo blog! Aqui vou compartilhar  dicas de programação e curiosidades da área de tecnologia </p> 
              <button>❤ <span>0</span></button>
              <button>👍 <span>0</span></button>
       </div>

</main>
</body>
<script>
       const botoes = document.querySelectorAll("button");

       botoes.forEach( function(botao){
              botao.addEventListener("click", botaoClicado);
    function botaoClicado(){
       console.log("fui clicado");
       let texto = botao.querySelector("span");
       texto.textContent++;
    }         
})


</script>
</html>
